<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<title>选择夜宵日期</title>
<meta name="viewport" content="width=device-width">
<link rel="stylesheet" href="./output.css">
</head>
<body>
<div id="wrapper">
  <h1 id="headerPrefix"></h1>
  <h1>
    <br>
    <b style="color: #ff9733" id="what"></b>
  </h1>
  <input type="button" class="inline-flex w-full justify-center rounded-md bg-gray-800 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-gray-600 sm:ml-3 sm:w-auto" value="开始" id="start">
  <input type="button" class="inline-flex w-full justify-center rounded-md bg-gray-800 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-gray-600 sm:ml-3 sm:w-auto" value="停止" id="stop" style="display: none">
  <input type="button" class="inline-flex w-full justify-center rounded-md bg-gray-800 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-gray-600 sm:ml-3 sm:w-auto" value="不行，换一天" id="next" style="display: none">
  <input type="button" class="inline-flex w-full justify-center rounded-md bg-gray-800 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-gray-600 sm:ml-3 sm:w-auto" value="可以，就这个" id="confirm" style="display: none">
</div>
<script src="./jquery-3.6.1.min.js"></script>
<script>
$(function() {
  const urlParams = new URLSearchParams(window.location.search);
  const selectedFood = urlParams.get('food') || '夜宵';
  $('#headerPrefix').html(`夜宵带我去吃${selectedFood}，哪天去？<br><br>`);

  let timer = null;
  let currentDateObj = null;
  let changeCount = 0;
  let isSpinning = false;

  function getDatesToSunday() {
    const today = new Date();
    const dayOfWeek = today.getDay();
    let endDay = 7;
    if (dayOfWeek === 0) endDay = 0;
    const dates = [];
    for (let i = 0; i <= endDay - dayOfWeek; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      dates.push(d);
    }
    return dates;
  }

  function formatDateText(date) {
    const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    const weekday = weekdays[date.getDay()];
    const today = new Date();
    today.setHours(0,0,0,0);
    const diffDays = Math.floor((date - today) / (1000 * 60 * 60 * 24));
    if (diffDays === 0) return `就${weekday}，今天去`;
    if (diffDays === 1) return `明天${weekday}去`;
    if (diffDays === 2) return `后天${weekday}去`;
    if (date.getDay() === 0) return `周日也可以`;
    return `还是${weekday}去`;
  }

  function showFloatingDate(date) {
    const rTop = Math.ceil(Math.random() * $(document).height());
    const rLeft = Math.ceil(Math.random() * ($(document).width() - 50));
    const rSize = Math.ceil(Math.random() * (37 - 14) + 14);
    $("<span class='temp'></span>")
      .html(formatDateText(date))
      .hide()
      .css({
        top: rTop,
        left: rLeft,
        color: "rgba(0,0,0,." + Math.random() + ")",
        fontSize: rSize + "px",
        position: "absolute",
        zIndex: 9999
      })
      .appendTo("body")
      .fadeIn("slow", function() {
        $(this).fadeOut("slow", function() {
          $(this).remove();
        });
      });
  }

  function updateDisplay(dateObj, withFloat) {
    const text = formatDateText(dateObj);
    $("#what").html(text);
    currentDateObj = dateObj;
    if (withFloat !== false) {
      showFloatingDate(dateObj);
    }
  }

  function startSpinning() {
    if (timer) clearInterval(timer);
    const dateList = getDatesToSunday();
    if (dateList.length === 0) return;
    timer = setInterval(function() {
      const idx = Math.floor(Math.random() * dateList.length);
      const newDate = dateList[idx];
      updateDisplay(newDate, true);
    }, 50);
    $("#start").hide();
    $("#stop").show();
    $("#next, #confirm").hide();
    isSpinning = true;
  }

  function stopSpinningAndShowButtons() {
    if (timer) {
      clearInterval(timer);
      timer = null;
    }
    $("#stop").hide();
    $("#next").show();
    $("#confirm").show();
    isSpinning = false;
  }

  function restartSpinning() {
    if (timer) clearInterval(timer);
    const dateList = getDatesToSunday();
    const idx = Math.floor(Math.random() * dateList.length);
    const newDate = dateList[idx];
    updateDisplay(newDate, true);
    timer = setInterval(function() {
      const newIdx = Math.floor(Math.random() * dateList.length);
      const nextDate = dateList[newIdx];
      updateDisplay(nextDate, true);
    }, 50);
    $("#next, #confirm").hide();
    $("#stop").show();
    isSpinning = true;
  }

  $("#start").click(function() {
    startSpinning();
  });

  $("#stop").click(function() {
    stopSpinningAndShowButtons();
  });

  $("#next").click(function() {
    if (!isSpinning) {
      changeCount++;
      if (changeCount > 1) {
        alert("别换了，就今天");
        const today = new Date();
        updateDisplay(today, true);
        $("#next").hide();
        return;
      }
      restartSpinning();
    }
  });

  $("#confirm").click(function() {
    if (timer) clearInterval(timer);
    alert(`这天去吃：${formatDateText(currentDateObj)}`);
    // 可选跳转或关闭
  });

  // 自动开始滚动
  startSpinning();
});
</script>
</body>
</html>
